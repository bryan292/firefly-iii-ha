name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: error
          scandir: './addon'
          
  build-and-test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: firefly
          MYSQL_USER: firefly
          MYSQL_PASSWORD: firefly
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        
      - name: Build Docker image
        run: |
          docker build -t fireflyiii-addon:test-amd64 ./addon
          
      - name: Run test container
        run: |
          docker run -d --name firefly-test \
            -p 8080:8080 \
            -e DB_CONNECTION=mysql \
            -e DB_HOST=host.docker.internal \
            -e DB_PORT=3306 \
            -e DB_DATABASE=firefly \
            -e DB_USERNAME=firefly \
            -e DB_PASSWORD=firefly \
            -e APP_KEY=base64:$(openssl rand -base64 32) \
            -e TRUSTED_PROXIES=** \
            fireflyiii-addon:test-amd64
            
      - name: Check container status
        run: |
          docker ps
          docker logs firefly-test
            
      - name: Wait for container to be ready
        run: |
          sleep 30
          timeout 120s bash -c 'until curl -s http://localhost:8080 | grep -q "Firefly"; do echo "Waiting for Firefly III to start..."; sleep 5; done' || echo "Timeout waiting for Firefly III"
          
      - name: Check if page loads
        run: |
          curl -s -v http://localhost:8080 || echo "Failed to connect to Firefly III"
