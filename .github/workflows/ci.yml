name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: error
          scandir: './addon'
          
  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
        
      - name: Build and export
        uses: docker/build-push-action@v2
        with:
          context: ./addon
          platforms: linux/amd64,linux/arm64
          load: true
          tags: fireflyiii-addon:test
          
  test:
    runs-on: ubuntu-latest
    needs: build
    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: firefly
          MYSQL_USER: firefly
          MYSQL_PASSWORD: firefly
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
        
    steps:
      - uses: actions/checkout@v2
      
      - name: Run test container
        run: |
          docker run -d --name firefly-test \
            -p 8080:8080 \
            -e DB_CONNECTION=mysql \
            -e DB_HOST=host.docker.internal \
            -e DB_PORT=3306 \
            -e DB_DATABASE=firefly \
            -e DB_USERNAME=firefly \
            -e DB_PASSWORD=firefly \
            -e APP_KEY=base64:$(openssl rand -base64 32) \
            -e TRUSTED_PROXIES=** \
            fireflyiii-addon:test
            
      - name: Wait for container to be ready
        run: |
          timeout 120s bash -c 'until curl -s http://localhost:8080 | grep -q "Firefly"; do echo "Waiting for Firefly III to start..."; sleep 5; done'
          
      - name: Check if login page loads
        run: |
          curl -s http://localhost:8080 | grep -q "Firefly"
