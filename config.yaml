name: "Firefly III (Ingress)"
slug: "firefly-iii"
version: "1.0.1"
description: "Firefly III personal finance manager as a Home Assistant add-on with Ingress."
url: "https://github.com/bryan292/firefly-iii-ha"
arch:
  - amd64
  - aarch64
  - armv7
startup: application
boot: auto
ingress: true
ingress_port: 8080
panel_icon: "mdi:finance"
panel_title: "Firefly III"
host_network: false
homeassistant_api: false
init: false
map:
  - data:rw
options:
  db_host: "127.0.0.1"
  db_port: 3306
  db_name: "firefly"
  db_user: "firefly"
  db_password: ""
  app_url: ""
  timezone: "UTC"
  site_owner: "owner@example.com"
  generate_app_key: true
schema:
  db_host: str
  db_port: int
  db_name: str
  db_user: str
  db_password: password
  app_url: str?
  timezone: str
  site_owner: str
  generate_app_key: bool
