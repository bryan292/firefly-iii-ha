name: "Firefly III"
description: "Firefly III personal finance manager, accessible via Home Assistant Ingress and backed by the MariaDB add-on."
version: "0.2.7"
slug: "firefly-iii"
init: false
arch:
  - amd64
startup: services
webui: http://[HOST]:[PORT:8080]
ingress: true
ingress_port: 8080
ingress_entry: /
panel_icon: mdi:piggy-bank
panel_title: Firefly III
host_network: false
hassio_api: true
homeassistant_api: false
ports:
  8080/tcp: null
services:
  - mysql:want
options:
  db_host: "core-mariadb"
  db_port: 3306
  db_name: "firefly"
  db_user: "firefly"
  db_password: ""
  app_key: ""
  app_url: ""
  trusted_proxies: "**"
  timezone: "America/Costa_Rica"
  php_memory_limit: "512M"
schema:
  db_host: "str"
  db_port: "int"
  db_name: "str"
  db_user: "str"
  db_password: "password"
  app_key: "str?"
  app_url: "str?"
  trusted_proxies: "str"
  timezone: "str"
  php_memory_limit: "str"
url: "https://www.firefly-iii.org/"
documentation: "https://github.com/yourusername/hassio-addons/blob/main/firefly-iii/README.md"
healthcheck: "http://localhost:8080/healthcheck"
