name: "Firefly III"
description: "Firefly III personal finance manager, accessible via Home Assistant Ingress and backed by the MariaDB add-on."
version: "0.1.3"
slug: "firefly-iii"
init: false
arch:
  - amd64
startup: services
webui: http://[HOST]:[PORT:8080]
ingress: true
ingress_port: 8080
ingress_entry: /
panel_icon: mdi:piggy-bank
panel_title: Firefly III
host_network: false
hassio_api: true
homeassistant_api: false
ports: {}
services:
  - mysql:want
options:
  db_host: "core-mariadb"
  db_port: 3306
  db_name: "homeassistant"
  db_user: "homeassistant"
  db_password: ""
  app_key: ""
  app_url: ""
  trusted_proxies: "**"
  timezone: "America/Costa_Rica"
  php_memory_limit: "512M"
schema:
  db_host: "str"
  db_port: "int"
  db_name: "str"
  db_user: "str"
  db_password: "str"
  app_key: "str"
  app_url: "str?"
  trusted_proxies: "str"
  timezone: "str"
  php_memory_limit: "str"
